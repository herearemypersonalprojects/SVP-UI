<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xác thực đăng nhập - SVP</title>
    <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
    <link rel="shortcut icon" href="assets/icons/favicon.svg">
    <style>
        body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
        .box { width: min(520px, 92vw); background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; text-align: center; }
        .spinner { width: 28px; height: 28px; border: 3px solid #dbeafe; border-top-color: #2563eb; border-radius: 50%; margin: 0 auto 10px; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .err { color: #b91c1c; }
    </style>
</head>
<body>
<div class="box">
    <div class="spinner"></div>
    <h1 style="font-size:20px; margin:0 0 8px;">Đang xác thực đăng nhập</h1>
    <p id="msg" style="margin:0;">Vui lòng đợi, hệ thống đang hoàn tất phiên đăng nhập...</p>
</div>
<script src="config.js"></script>
<script src="auth-topbar.js"></script>
<script>
(() => {
    const API_BASE_URL = window.SVP_API_BASE_URL || 'http://localhost:8080';
    const msg = document.getElementById('msg');
    const spinnerEl = document.querySelector('.spinner');

    const hideSpinner = () => { if (spinnerEl) spinnerEl.style.display = 'none'; };

    const applyTokens = (data) => {
        const accessToken = data.accessToken || '';
        const refreshToken = data.refreshToken || '';
        if (!accessToken || !refreshToken) {
            msg.textContent = 'Không tìm thấy token đăng nhập. Vui lòng thử lại.';
            msg.className = 'err';
            hideSpinner();
            return;
        }
        localStorage.setItem('accessToken', accessToken);
        localStorage.setItem('refreshToken', refreshToken);
        if (data.email) localStorage.setItem('userEmail', data.email);
        if (data.nickname) localStorage.setItem('userNickname', data.nickname);
        if (data.displayName) localStorage.setItem('userDisplayName', data.displayName);
        if (data.userId) localStorage.setItem('userId', data.userId);

        msg.textContent = 'Đăng nhập thành công. Đang chuyển về trang chủ...';
        setTimeout(() => { window.location.replace('index.html'); }, 500);
    };

    // New flow: token in query string → call backend API to verify
    const queryToken = new URLSearchParams(window.location.search).get('token');
    if (queryToken) {
        (async () => {
            try {
                const url = `${API_BASE_URL}/auth/magic-link/verify?format=json&token=${encodeURIComponent(queryToken)}`;
                const response = await fetch(url, {
                    method: 'GET',
                    headers: { Accept: 'application/json' }
                });
                const payload = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(payload.error || 'Magic link không hợp lệ hoặc đã hết hạn.');
                }
                // Remove token from URL to prevent re-use on refresh
                window.history.replaceState(null, '', window.location.pathname);
                applyTokens(payload);
            } catch (err) {
                msg.textContent = (err && err.message) || 'Không thể xác thực. Vui lòng thử lại.';
                msg.className = 'err';
                hideSpinner();
            }
        })();
        return;
    }

    // Legacy flow: tokens already in hash fragment (from backend 302 redirect)
    const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
    applyTokens({
        accessToken: hashParams.get('accessToken') || '',
        refreshToken: hashParams.get('refreshToken') || '',
        email: hashParams.get('email') || '',
        nickname: hashParams.get('nickname') || '',
        displayName: hashParams.get('displayName') || '',
        userId: hashParams.get('userId') || ''
    });
})();
</script>
</body>
</html>
