<header>

    <small style="
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    ">
      Your location is used solely to center the map around you.
      No location data is stored on our servers.
    </small>

  </div>
</header>

<main>
  <div id="map"></div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-top">
        <span id="nearby-title">Điểm gần bạn</span>
      </div>

      <div class="filter-row">
        <div class="radius-row">
          <label id="radius-label" for="radius">Bán kính:</label>
          <select id="radius" class="radius-select">
            <option value="0.5">500 m</option>
            <option value="1" selected>1 km</option>

            <option value="10">10 km</option>

          <label id="priority-label" for="priority-filter">Priority:</label>
          <select id="priority-filter" class="priority-select">
            <option value="topscore">Most famous</option>
            <option value="nearest">Nearest</option>
          </select>
        </div>

          <label id="count-label" for="max-points">Số điểm:</label>
          <select id="max-points" class="count-select">

        Di chuyển bản đồ hoặc bấm "📍 Vị trí của tôi" để xem các di sản gần bạn.

<script>
  /* ==== JS giống bản gốc, chỉ khác hàm isMobile() ==== */

  let map;
  let pois = [];
  let markers = [];
  let currentRadiusKm = 1;
  let currentMaxPoints = 20;
  let currentPriority = "topscore";

  let isProgrammaticMove = false;

  let forcedPoiRefLower = null; // ✅ force include this POI in nearby selection

  let mapLoaded = false;

  // ===============================
  // Deep-link + URL sync (WEB)
  // ===============================
  const urlParams = new URLSearchParams(window.location.search);
  const deepLinkRef = (urlParams.get("id") || "").trim().toLowerCase();
  let deepLinkDone = false;

  function getCurrentLangIdForUrl() {
    return (currentLangConfig?.id || "en").toLowerCase();
  }

  function updateUrlLangOnly() {
    const url = new URL(window.location.href);
    url.searchParams.set("lang", getCurrentLangIdForUrl());
    history.replaceState({}, "", url.toString());
  }

  function updateUrlWithPoi(poi) {
    if (!poi || !poi.reference) return;
    const url = new URL(window.location.href);
    url.searchParams.set("id", poi.reference);
    url.searchParams.set("lang", getCurrentLangIdForUrl());
    history.replaceState({}, "", url.toString());
  }

  function clearPoiFromUrl() {
    const url = new URL(window.location.href);
    url.searchParams.delete("id");
    url.searchParams.set("lang", getCurrentLangIdForUrl());
    history.replaceState({}, "", url.toString());
  }

  function findPoiIdxByRef(refLower) {
    if (!refLower) return null;
    for (let i = 0; i < pois.length; i++) {
      const r = (pois[i]?.reference || "").toLowerCase();
      if (r === refLower) return i;
    }
    return null;
  }

  function tryOpenDeepLink() {
    if (!deepLinkRef || deepLinkDone) return;
    if (!map || !mapLoaded) return;
    if (!pois || !pois.length) return;

    const idx = findPoiIdxByRef(deepLinkRef);
    if (idx === null) return; // not yet in current dataset (core/full)

    const poi = pois[idx];
    if (!poi || !poi.lat || !poi.lon) {
      deepLinkDone = true;
      return;
    }

    deepLinkDone = true;

    // Ensure this POI exists in the "selected" list even if topscore excludes it
    forcedPoiRefLower = deepLinkRef;

    // Set selection state immediately (important for list highlight + scroll)
    highlightedPoiIdx = poi._idx;

    // Move map to POI
    isProgrammaticMove = true;
    map.jumpTo({
      center: [poi.lon, poi.lat],
      zoom: Math.max(map.getZoom(), 15)
    });

    // Rebuild markers + list around the new center
    updateNearbyList();

    // Open popup AFTER DOM/layout is ready (Firefox needs this)
    requestAnimationFrame(() => {
      const marker = markers.find(m => m._poiIdx === poi._idx);

      highlightMarkerForPoiIdx(poi._idx);
      highlightPoiListItem(poi._idx); // includes scrolling logic you added
      updateUrlWithPoi(poi);

      if (!marker) {
        // One small retry in case updateNearbyList hasn't produced markers yet
        setTimeout(() => {
          const m2 = markers.find(m => m._poiIdx === poi._idx);
          if (!m2) return;
          closeAllPopups(poi._idx);
          if (m2._updatePopupContent) m2._updatePopupContent();
          const p2 = m2.getPopup();
          if (p2) p2.setLngLat([poi.lon, poi.lat]).addTo(map);
        }, 50);
        return;
      }

      closeAllPopups(poi._idx);
      if (marker._updatePopupContent) marker._updatePopupContent();
      const popup = marker.getPopup();
      if (popup) popup.setLngLat([poi.lon, poi.lat]).addTo(map);
    });
  }



  // ✅ NEW: last center used for nearby calculation
  let lastCenterForNearby = null;


  // LUÔN coi đây là bản Web
  function isMobile() {
    return false;
  }

  const languageConfigs = [
    { id: "en", key: "story_en",         flag: "🇬🇧", label: "English",       ttsLang: "en-US" },
    { id: "fr", key: "story",            flag: "🇫🇷", label: "Français",      ttsLang: "fr-FR" },
    { id: "vi", key: "story_vn",         flag: "🇻🇳", label: "Tiếng Việt",    ttsLang: "vi-VN" },

    return match || languageConfigs[0];

  function closeAllPopups(exceptIdx = null) {
    if (!markers || !markers.length) return;
    markers.forEach(m => {
      if (!m || typeof m.getPopup !== "function") return;
      const p = m.getPopup();
      if (p && p.isOpen() && m._poiIdx !== exceptIdx) {
        p.remove();
      }
    });
  }

function getUiLangId() {
  if (!currentLangConfig) return 'en';
  const id = currentLangConfig.id;
  // nếu có cấu hình i18n cho id thì dùng, không thì fallback English
  return i18n[id] ? id : 'en';
}


  function getName(poi) {
    const lang = getUiLangId();
    if (lang === "vi") {
      return poi.name_vn || poi.name_en || poi.name || "Không tên";
    } else if (lang === "en") {
      return poi.name_en || poi.name || poi.name_vn || "Unnamed";
    } else {
      return poi.name || poi.name_en || poi.name_vn || "Sans nom";
    }
  }

  function getAddress(poi) {
    const lang = getUiLangId();
    if (lang === "vi") {
      return poi.address_vn || poi.address_en || poi.address || "";
    } else if (lang === "en") {
      return poi.address_en || poi.address || poi.address_vn || "";
    } else {
      return poi.address || poi.address_en || poi.address_vn || "";
    }
  }

  function getStory(poi) {
    // Ưu tiên dùng field tương ứng với currentLangConfig.key
    if (currentLangConfig && poi[currentLangConfig.key]) {
      return poi[currentLangConfig.key];
    }

    // Fallback theo thứ tự ưu tiên: tiếng Anh -> tiếng Pháp gốc ->  tiếng Việt
    if (poi.story_en) return poi.story_en;
    if (poi.story)    return poi.story;
    if (poi.story_vn) return poi.story_vn;

    return "";
  }


  function loadVoices() {
    voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  }
  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  }

  function getVoiceForLangCode(langCode) {
    if (!voices || !voices.length) return null;
    const prefix = langCode.split("-")[0].toLowerCase();
    let v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix));
    if (!v) v = voices[0];
    return v;
  }

  function playPoiStory(index) {
    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    if (!("speechSynthesis" in window)) {
      alert(t.ttsNotSupported);
      return;
    }

    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      window.speechSynthesis.cancel();
      currentUtterance = null;
      return;
    }

    const poi = pois[index];
    if (!poi) return;
    const text = getStory(poi);
    if (!text) {
      alert(t.ttsNoText);
      return;
    }

    const langCode = currentLangConfig?.ttsLang || "en-US";
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langCode;
    const v = getVoiceForLangCode(langCode);
    if (v) utter.voice = v;

    currentUtterance = utter;
    window.speechSynthesis.speak(utter);
  }

  window.playPoiStory = playPoiStory;

  function distanceKm(lat1, lon1, lat2, lon2, cosLat1 = null) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const cos1 = cosLat1 !== null ? cosLat1 : Math.cos(lat1 * Math.PI / 180);
    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      cos1 * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }


  function highlightMarkerForPoiIdx(idx) {
    highlightedPoiIdx = idx;
    markers.forEach(m => {
      if (!m._el) return;
      if (m._poiIdx === idx) {
        m._el.classList.add("highlighted");
      } else {
        m._el.classList.remove("highlighted");
      }
    });
  }

  function highlightPoiListItem(idx) {
    const listItems = poiListEl.querySelectorAll('.poi-item');
    listItems.forEach(li => {
      const poiIdx = parseInt(li.getAttribute('data-poi-idx'));
      if (poiIdx === idx) {
        li.classList.add('active');
        li.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else {
        li.classList.remove('active');
      }
    });
      // ✅ ensure visible in the right sidebar scroll container
    scrollPoiListToIdx(idx, "smooth");
  }

  function createMarker(poi) {
    const el = document.createElement("div");
    el.className = "poi-marker";

    const marker = new maplibregl.Marker({ element: el, anchor: 'center' })
      .setLngLat([poi.lon, poi.lat])
      .addTo(map);

    marker._el = el;
    marker._poiIdx = poi._idx;

    const popup = new maplibregl.Popup({ offset: 18, closeButton: false, closeOnClick: false });

    function updatePopupContent() {
      const title = getName(poi);
      const addr = getAddress(poi);
      const story = getStory(poi);
      const uiLang = getUiLangId();
      const t = i18n[uiLang];

      const html = `
        <div>
          <div class="popup-title">${title}</div>
          <div class="popup-address">${addr}</div>
          <div class="popup-story">${story.slice(0, 260)}...</div>
          <button class="popup-tts-btn" onclick="playPoiStory(${poi._idx})">
            ${t.ttsLabel}
          </button>
        </div>
      `;
      popup.setHTML(html);
    }

    updatePopupContent();

    el.addEventListener("click", (e) => {
      e.stopPropagation();
      onPoiClick(poi);          // 👈 log GA

      updateUrlWithPoi(poi); // ✅ NEW: URL partageable

      highlightMarkerForPoiIdx(poi._idx);
      highlightPoiListItem(poi._idx);
      updatePopupContent();

      // Web: luôn hiển thị popup
      closeAllPopups(poi._idx);

      if (!marker._popup || !marker._popup.isOpen()) {
        marker.setPopup(popup);
        popup.setLngLat([poi.lon, poi.lat]).addTo(map);
      }
    });

    marker.setPopup(popup);
    marker._updatePopupContent = updatePopupContent;

    return marker;
  }

  function clearMarkers() {
    markers.forEach(m => m.remove());
    markers = [];
  }

  function updateUserMarker() {
    if (!map || !userLocation) return;
    if (userMarker) {
      userMarker.setLngLat([userLocation.lon, userLocation.lat]);
    } else {
      const el = document.createElement("div");
      el.className = "user-marker";
      userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([userLocation.lon, userLocation.lat])
        .addTo(map);
    }
  }

  function updateNearbyList() {
    if (!map || !pois.length) return;
    const center = map.getCenter();
    const centerLat = center.lat;
    const centerLon = center.lng;


    // ✅ remember the center used for this computation
    lastCenterForNearby = { lat: centerLat, lon: centerLon };

    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    const valid = pois.filter(p => p.lat && p.lon);

    const cosLatCenter = Math.cos(centerLat * Math.PI / 180);
    let within = valid
      .map(p => ({
        ...p,
        dist: distanceKm(centerLat, centerLon, p.lat, p.lon, cosLatCenter),
      }))
      .filter(p => p.dist <= currentRadiusKm);

    let selected = [];

    if (within.length === 0) {
      selected = [];
    } else if (currentPriority === "nearest") {
      selected = within
        .sort((a, b) => a.dist - b.dist)
        .slice(0, currentMaxPoints);
    } else {
      selected = within
        .sort((a, b) => {
          const sa = typeof a.score === "number" ? a.score : -Infinity;
          const sb = typeof b.score === "number" ? b.score : -Infinity;
          return sb - sa;
        });
      if (selected.length > currentMaxPoints) {
        selected = selected.slice(0, currentMaxPoints);
      }
    }

    // ✅ Force include a POI (deep-link) even if "topscore" would exclude it
    if (forcedPoiRefLower) {
      const forced = valid.find(p => ((p.reference || "").toLowerCase() === forcedPoiRefLower));
      if (forced) {
        const already = selected.some(x => x._idx === forced._idx);
        if (!already) {
          selected.unshift(forced);                 // ensure it exists => marker will be created
          if (selected.length > currentMaxPoints) { // keep list length stable
            selected.pop();
          }
        }
      }
    }

    lastNearbyPois = selected;

    clearMarkers();
    selected.forEach(p => {
      const m = createMarker(p);
      markers.push(m);
    });

    highlightMarkerForPoiIdx(highlightedPoiIdx);
    updateUserMarker();

    poiListEl.innerHTML = "";

    if (!selected.length) {
      const li = document.createElement("li");
      li.className = "empty";
      li.textContent = t.empty(currentRadiusKm);
      poiListEl.appendChild(li);
      updateNearbyTitle(0);
      return;
    }
    updateNearbyTitle(selected.length);

    selected.forEach(poi => {
      const li = document.createElement("li");
      li.className = "poi-item";
      li.setAttribute('data-poi-idx', poi._idx);

      const title = getName(poi);
      const addr = getAddress(poi);
      const story = getStory(poi);

      let scoreText = "";
      if (typeof poi.score === "number") {
        const rounded = Math.round(poi.score * 100) / 10;
        scoreText = rounded.toFixed(1);
      }

      const imgSrc = poi.reference
        ? `./images/${poi.reference.toLowerCase()}.jpg`
        : "";

      li.innerHTML = `
        <div class="poi-content">
          <img
            class="poi-thumb"
            src="${imgSrc}"
            alt="${title}"
            onerror="this.style.display='none';"
          />
          <div class="poi-main">
            <div class="poi-top-row">
              <div>
                <div class="poi-title">${title}</div>
                <div class="poi-address">${addr}</div>
              </div>
              ${scoreText
                ? `<div class="poi-score">⭐ ${scoreText}/10</div>`
                : ""
              }
            </div>
            <div class="poi-story">${story}</div>
            <button type="button"
              class="tts-inline"
              onclick="playPoiStory(${poi._idx})">
              ${t.ttsLabel}
            </button>
          </div>
        </div>
      `;

      if (poi._idx === highlightedPoiIdx) {
        li.classList.add('active');
      }

      li.addEventListener("click", () => {
        updateUrlWithPoi(poi); // ✅ NEW

        highlightPoiListItem(poi._idx);
        highlightMarkerForPoiIdx(poi._idx);

        const marker = markers.find(m => m._poiIdx === poi._idx);
        if (marker) {
          closeAllPopups(poi._idx);
          const popup = marker.getPopup();
          if (popup && !popup.isOpen()) {
            popup.setLngLat([poi.lon, poi.lat]).addTo(map);
          }
        }

        isProgrammaticMove = true;
        map.flyTo({
          center: [poi.lon, poi.lat],
          zoom: 15,
          essential: true
        });
      });

      poiListEl.appendChild(li);
    });
  }

  function fitToNearbyPois() {
    if (!map || !lastNearbyPois || !lastNearbyPois.length) return;

    if (lastNearbyPois.length === 1) {
      const p = lastNearbyPois[0];
      map.flyTo({
        center: [p.lon, p.lat],
        zoom: 16,
        essential: true
      });
      return;
    }

    const bounds = new maplibregl.LngLatBounds();
    lastNearbyPois.forEach(p => bounds.extend([p.lon, p.lat]));
    if (userLocation) bounds.extend([userLocation.lon, userLocation.lat]);

    map.fitBounds(bounds, { padding: 40 });
  }

  function initMap() {
    const osmStyle = {
      version: 8,
      sources: {
        "osm-tiles": {
          type: "raster",
          tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
          tileSize: 256,
          attribution: ""
        }
      },
      layers: [
        {
          id: "osm-tiles",
          type: "raster",
          source: "osm-tiles",
          minzoom: 0,
          maxzoom: 19
        }
      ]
    };

    map = new maplibregl.Map({
      container: "map",
      style: osmStyle,
      center: [PARIS_CENTER.lon, PARIS_CENTER.lat],
      zoom: 5
    });

    map.on("load", () => {
      mapLoaded = true;

      if (deepLinkRef) {
        tryOpenDeepLink();  // will open if POIs already loaded, otherwise it will be called again later
        return;
      }
      resetView();
    });

    map.on("moveend", () => {
      if (isProgrammaticMove) {
        isProgrammaticMove = false;
        return;
      }

        // ✅ NEW: ignore zoom-only changes (center practically unchanged)
      const newCenter = map.getCenter();
      if (lastCenterForNearby) {
        const d = distanceKm(
          newCenter.lat, newCenter.lng,
          lastCenterForNearby.lat, lastCenterForNearby.lon
        );
        // ~0.003 km = 3 meter → treat as “same center”
        if (d < 0.003) {
          return;
        }
      }

      updateNearbyList();
    });

    map.on("click", (e) => {
      if (!e.originalEvent.target.closest('.maplibregl-marker')) {
        highlightMarkerForPoiIdx(null);
        highlightPoiListItem(null);
        highlightedPoiIdx = null;

        clearPoiFromUrl(); // ✅ NEW (optionnel mais recommandé)
      }
    });
  }

  async function loadPois() {

    // 1️⃣ Không có cache → dùng chiến lược core + background như trước
    try {
      // 1.1. Load nhanh bản core (≈100 POIs)
      const resCore = await fetch("paris_core.json");
      if (!resCore.ok) {
        throw new Error("Không load được paris_core.json: " + resCore.status);
      }

      const rawCore = await resCore.json();

      // Gán _idx tạm thời cho core
      pois = rawCore.map((p, idx) => ({ ...p, _idx: idx }));

      // Build map reference -> POI (tạm)
      poisByRef = {};
      pois.forEach(p => {
        if (p.reference) {
          poisByRef[p.reference] = p;
        }
      });

    console.log("Core POIs loaded:", pois.length);

    if (map) {
      if (deepLinkRef) {
        tryOpenDeepLink();     // ✅ this will build nearby + open popup
      } else {
        updateNearbyList();
        fitToNearbyPois();
      }
    }

    // 1.2. Load full in background
    loadFullPoisInBackground();

    } catch (err) {
      console.error(err);
      alert("Không load được dữ liệu POI ban đầu (paris_core.json). Hãy kiểm tra lại file và đường dẫn.");
    }
  }


  async function loadFullPoisInBackground() {
    try {
      console.log('⏳ Loading full POIs in background...');
      const resFull = await fetch("paris_story_multilanguage.json");
      if (!resFull.ok) {
        throw new Error("Không load được paris_story_multilanguage.json: " + resFull.status);
      }

      const rawFull = await resFull.json();

      // Duyệt full, merge vào poisByRef
      rawFull.forEach(p => {
        const ref = p.reference;
        if (!ref) return;

        if (poisByRef[ref]) {
          // 🔁 Đã có trong core → cập nhật fields mới
          poisByRef[ref] = {
            ...poisByRef[ref],
            ...p
          };
        } else {
          // ➕ Chưa có trong core → thêm mới
          poisByRef[ref] = { ...p };
        }
      });

      // Chuyển lại về mảng pois, gán _idx mới
      const mergedList = Object.values(poisByRef).map((p, idx) => ({
        ...p,
        _idx: idx
      }));

      pois = mergedList;
      isFullPoisLoaded = true;
      console.log("✅ Full POIs loaded & merged:", pois.length);

      if (map) {
        if (deepLinkRef) {
          deepLinkDone = false;      // ✅ allow reopening after merge
          tryOpenDeepLink();     // ✅ rebuild + open popup using full data
        } else {
          updateNearbyList();
        }
      }

    } catch (err) {
      console.error("Lỗi load full POIs:", err);
      // Không alert để tránh làm phiền user
    }
  }



  function renderLanguageMenu() {
    if (!availableLanguages.length) return;
    langMenu.innerHTML = "";

    availableLanguages.forEach(cfg => {
      const btn = document.createElement("button");
      btn.setAttribute("data-lang-id", cfg.id);
      btn.innerHTML = `<span>${cfg.flag}</span><span>${cfg.label}</span>`;
      langMenu.appendChild(btn);
    });

    langToggleBtn.textContent = currentLangConfig.flag || "🌐";
  }

  function applyLanguage() {
    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    appTitleEl.textContent    = t.appTitle;
    appSubtitleEl.textContent = t.appSubtitle;
    locateBtn.textContent     = t.locate;
    radiusLabelEl.textContent = t.radiusLabel;
    priorityLabelEl.textContent = t.priorityLabel;
    countLabelEl.textContent  = t.countLabel;
    updateNearbyTitle(lastNearbyPois.length || 0);

    const nearestOpt = prioritySelect.querySelector('option[value="nearest"]');
    const topOpt = prioritySelect.querySelector('option[value="topscore"]');
    if (nearestOpt) nearestOpt.textContent = t.priorityNearest;
    if (topOpt) topOpt.textContent = t.priorityTopScore;

    if (currentLangConfig) {
      langToggleBtn.textContent = currentLangConfig.flag || "🌐";
    }

    markers.forEach(m => m._updatePopupContent && m._updatePopupContent());

    updateNearbyList();

    // ✅ NEW: garder l'URL cohérente avec la langue (et conserver id si un POI est sélectionné)
    updateUrlLangOnly();
    if (highlightedPoiIdx !== null && pois[highlightedPoiIdx]?.reference) {
      updateUrlWithPoi(pois[highlightedPoiIdx]);
    }

  }

  function scrollPoiListToIdx(idx, behavior = "smooth") {
    if (idx === null || idx === undefined) return;

    const container = poiListEl; // <ul id="poi-list" ...> is the scroll container
    const item = container.querySelector(`.poi-item[data-poi-idx="${idx}"]`);
    if (!item) return;

    const pad = 12; // small top/bottom margin
    const itemTop = item.offsetTop;
    const itemBottom = itemTop + item.offsetHeight;

    const viewTop = container.scrollTop;
    const viewBottom = viewTop + container.clientHeight;

    // already fully visible
    if (itemTop >= viewTop + pad && itemBottom <= viewBottom - pad) return;

    let targetTop;
    if (itemTop < viewTop) {
      targetTop = Math.max(0, itemTop - pad);
    } else {
      targetTop = Math.max(0, itemBottom - container.clientHeight + pad);
    }

    container.scrollTo({ top: targetTop, behavior });
  }

  function resetView() {
    let center;

    if (userLocation) {
      const d = distanceKm(
        userLocation.lat,
        userLocation.lon,
        PARIS_CENTER.lat,
        PARIS_CENTER.lon
      );
      if (d <= 8) {  // If userLocation is known and within 8 km of PARIS_CENTER → center is user location.
        center = [userLocation.lon, userLocation.lat];
      }
    }

    if (!center) {
      center = [NOTRE_DAME.lon, NOTRE_DAME.lat];
    }

    map.jumpTo({
      center,
      zoom: 14
    });

    highlightMarkerForPoiIdx(null);
    highlightPoiListItem(null);
    highlightedPoiIdx = null;

    updateNearbyList();
    fitToNearbyPois();
  }

  function initControls() {
    radiusSelect.addEventListener("change", () => {
      currentRadiusKm = parseFloat(radiusSelect.value);
      updateNearbyList();
      fitToNearbyPois();
      onChangeRadius(currentRadiusKm);
    });

    prioritySelect.addEventListener("change", () => {
      currentPriority = prioritySelect.value || "nearest";
      updateNearbyList();
      fitToNearbyPois();
      onChangePriority(currentPriority);
    });

    maxPointsSelect.addEventListener("change", () => {
      currentMaxPoints = parseInt(maxPointsSelect.value, 10) || 20;
      updateNearbyList();
      fitToNearbyPois();
    });

    locateBtn.addEventListener("click", () => {
      const uiLang = getUiLangId();
      const t = i18n[uiLang];
      if (!navigator.geolocation) {
        alert("Trình duyệt không hỗ trợ định vị.");
        return;
      }
      locateBtn.disabled = true;
      locateBtn.textContent = t.locate.replace("📍", "⏳");

      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          userLocation = { lat: latitude, lon: longitude };
          updateUserMarker();
          map.flyTo({
            center: [longitude, latitude],
            zoom: 14,
            essential: true
          });
          locateBtn.disabled = false;
          locateBtn.textContent = t.locate;
        },
        err => {
          console.error(err);
          alert("Không lấy được vị trí của bạn.");
          locateBtn.disabled = false;
          locateBtn.textContent = t.locate;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    langToggleBtn.addEventListener("click", () => {
      langMenu.classList.toggle("open");
    });

    langMenu.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang-id]");
      if (!btn) return;
      const id = btn.getAttribute("data-lang-id");
      if (!id) return;
      const cfg = availableLanguages.find(l => l.id === id);
      if (!cfg || cfg === currentLangConfig) {
        langMenu.classList.remove("open");
        return;
      }
      currentLangConfig = cfg;
      langMenu.classList.remove("open");
      applyLanguage();
    });

    document.addEventListener("click", (e) => {
      if (!langMenu.contains(e.target) && !langToggleBtn.contains(e.target)) {
        langMenu.classList.remove("open");
      }
    });
  }

function updateNearbyTitle(count) {
  const uiLang = getUiLangId();
  const t = i18n[uiLang];

  if (!count || count <= 0) {
      // No POIs → just show the plain label
      nearbyTitleEl.textContent = t.nearbyDefault;
    } else {
      // Show count + label, e.g. "10 Nearby places"
      nearbyTitleEl.textContent = `${count} ${t.nearbyDefault}`;
    }
  }


  (async function main() {
    // 1️⃣ Init map & UI càng sớm càng tốt
    initMap();
    initControls();
    renderLanguageMenu();
    applyLanguage();   // sẽ hiển thị text, nút… ngay cả khi chưa có POI

    // 2️⃣ Load POIs ngầm
    loadPois();        // KHÔNG await
  })();

</script>
