<body>
<header>
  <div class="left">
    <div id="app-title" class="title">PARIS DISCOVERY</div>
    <div id="app-subtitle" class="subtitle">
      Move around to discover heritage sites near you.
    </div>
  </div>
  <div class="controls">
    <div class="lang-switch">
      <button id="lang-toggle" class="lang-toggle" aria-label="Change language">🇬🇧</button>
      <div id="lang-menu" class="lang-menu"></div>
    </div>
    <a class="home-link" href="../../index.html" aria-label="Quay về trang chủ SVP" title="Quay về trang chủ SVP">🏠 SVP</a>
    <button id="locate-btn">📍 My location</button>
    <small style="
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    ">
      Your location is used solely to center the map around you.
      No location data is stored on our servers.
    </small>


  </div>
</header>

<main>
  <div class="map-sidebar-wrapper">
    <div id="map"></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <span id="nearby-title">Nearby places</span>
        </div>

        <div class="filter-row">
          <div class="radius-row">
            <label id="radius-label" for="radius">Radius:</label>
            <select id="radius" class="radius-select">
              <option value="0.5">500 m</option>
              <option value="1" selected>1 km</option>
              <option value="2">2 km</option>
              <option value="5">5 km</option>
              <option value="10">10 km</option>
            </select>
          </div>

          <div class="priority-row">
            <label id="priority-label" for="priority-filter">Priority:</label>
            <select id="priority-filter" class="priority-select">
              <option value="topscore">Most famous</option>
              <option value="nearest">Nearest</option>
            </select>
          </div>

          <div class="count-row">
            <label id="count-label" for="max-points">Places:</label>
            <select id="max-points" class="count-select">
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="20" selected>20</option>
            </select>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <section id="poi-detail"></section>
</main>

<script>
  let map;
  let pois = [];
  let markers = [];
  let currentRadiusKm = 1;
  let currentMaxPoints = 20;
  let currentPriority = "topscore";
  let isProgrammaticMove = false;
  let isLocateMove = false;

  // ===============================
  // Deep-link: ?id=<poi.reference>
  // ===============================
  const params = new URLSearchParams(window.location.search);
  const deepLinkRef = (params.get("id") || "").trim().toLowerCase();
  let deepLinkDone = false;

  function getCurrentLangIdForUrl() {
    // On veut un id stable: "vi", "fr", "en", etc.
    return (currentLangConfig?.id || "en").toLowerCase();
  }

  function updateUrlWithPoi(poi) {
    if (!poi || !poi.reference) return;

    const url = new URL(window.location.href);
    url.searchParams.set("id", poi.reference);              // ex: PA00086321
    url.searchParams.set("lang", getCurrentLangIdForUrl()); // ex: vi
    history.replaceState({}, "", url.toString());
  }

  function clearPoiFromUrl() {
    const url = new URL(window.location.href);
    url.searchParams.delete("id");
    // On garde lang (utile pour partager l’UI dans la bonne langue)
    url.searchParams.set("lang", getCurrentLangIdForUrl());
    history.replaceState({}, "", url.toString());
  }


  function findPoiIdxByRef(refLower) {
    if (!refLower) return null;
    for (let i = 0; i < pois.length; i++) {
      const r = (pois[i]?.reference || "").toLowerCase();
      if (r === refLower) return i;
    }
    return null;
  }

  function openPoiFromDeepLink() {
    if (!deepLinkRef || deepLinkDone) return;
    if (!map || !pois || !pois.length) return;

    const idx = findPoiIdxByRef(deepLinkRef);
    if (idx === null) return; // pas encore dans core/full

    const poi = pois[idx];
    if (!poi || !poi.lat || !poi.lon) return;

    deepLinkDone = true;

    // 1) Centrer la carte sur le POI (comme quand on clique: on veut voir ce POI)
    //    On fait un jumpTo pour éviter les effets de bord, puis on calcule les nearby autour de ce centre.
    isProgrammaticMove = true;
    map.jumpTo({
      center: [poi.lon, poi.lat],
      zoom: Math.max(map.getZoom(), 16)
    });

    // 2) Recalculer nearby => crée les markers, dont celui du POI
    updateNearbyList();

    // 3) EXACTEMENT le même comportement qu’un clic sur marker :
    //    - GA: onPoiClick(poi)
    //    - detail + highlight/label violet via showPoiDetail()
    onPoiClick(poi);
    showPoiDetail(idx, { skipMove: true }); // skipMove car on vient déjà de centrer la map
  }

  let isFullPoisLoaded = false;   // đã load xong bản full chưa?
  let poisByRef = {};             // dùng để merge nhanh theo reference

  // ✅ NEW: last center used for nearby calculation
  let lastCenterForNearby = null;

  const languageConfigs = [
    { id: "en", key: "story_en",         flag: "🇬🇧", label: "English",       ttsLang: "en-US" },
    { id: "fr", key: "story",            flag: "🇫🇷", label: "Français",      ttsLang: "fr-FR" },
    { id: "vi", key: "story_vn",         flag: "🇻🇳", label: "Tiếng Việt",    ttsLang: "vi-VN" },
    { id: "pt", key: "story_portuguese", flag: "🇵🇹", label: "Português",     ttsLang: "pt-PT" },
    { id: "ar", key: "story_arabic",     flag: "🇸🇦", label: "العربية",       ttsLang: "ar-SA" },

  function getUiLangId() {
    if (!currentLangConfig) return 'en';
    const id = currentLangConfig.id;
    return i18n[id] ? id : 'en';
  }

  function getName(poi) {
    const lang = getUiLangId();
    if (lang === "vi") {
      return poi.name_vn || poi.name_en || poi.name || "Không tên";
    } else if (lang === "en") {
      return poi.name_en || poi.name || poi.name_vn || "Unnamed";
    } else {
      return poi.name || poi.name_en || poi.name_vn || "Sans nom";
    }
  }

  function getAddress(poi) {
    const lang = getUiLangId();
    if (lang === "vi") {
      return poi.address_vn || poi.address_en || poi.address || "";
    } else if (lang === "en") {
      return poi.address_en || poi.address || poi.address_vn || "";
    } else {
      return poi.address || poi.address_en || poi.address_vn || "";
    }
  }

  function getStory(poi) {
    if (currentLangConfig && poi[currentLangConfig.key]) {
      return poi[currentLangConfig.key];
    }
    if (poi.story_en) return poi.story_en;
    if (poi.story)    return poi.story;
    if (poi.story_vn) return poi.story_vn;
    return "";
  }

  function loadVoices() {
    voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  }
  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();
  }

  function getVoiceForLangCode(langCode) {
    if (!voices || !voices.length) return null;
    const prefix = langCode.split("-")[0].toLowerCase();
    let v = voices.find(v => v.lang && v.lang.toLowerCase().startsWith(prefix));
    if (!v) v = voices[0];
    return v;
  }

  function playPoiStory(index) {
    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    if (!("speechSynthesis" in window)) {
      alert(t.ttsNotSupported);
      return;
    }

    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      window.speechSynthesis.cancel();
      currentUtterance = null;
      return;
    }

    const poi = pois[index];
    if (!poi) return;
    const text = getStory(poi);
    if (!text) {
      alert(t.ttsNoText);
      return;
    }

    const langCode = currentLangConfig?.ttsLang || "en-US";
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = langCode;
    const v = getVoiceForLangCode(langCode);
    if (v) utter.voice = v;

    currentUtterance = utter;
    window.speechSynthesis.speak(utter);
  }

  window.playPoiStory = playPoiStory;

  function distanceKm(lat1, lon1, lat2, lon2, cosLat1 = null) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const cos1 = cosLat1 !== null ? cosLat1 : Math.cos(lat1 * Math.PI / 180);
    const a =
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      cos1 * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }


  function highlightMarkerForPoiIdx(idx) {
    highlightedPoiIdx = idx;

    markers.forEach(m => {
      if (!m._el) return;

      const wrapper = m._el;
      const iconEl  = wrapper.querySelector(".poi-marker");

      if (m._poiIdx === idx) {
        // Marker này đang được chọn
        wrapper.classList.add("show-label");
        if (iconEl) iconEl.classList.add("highlighted");
      } else {
        wrapper.classList.remove("show-label");
        if (iconEl) iconEl.classList.remove("highlighted");
      }
    });
  }


  function createMarker(poi) {
    // Wrapper chứa label + icon
    const wrapper = document.createElement("div");
    wrapper.className = "poi-marker-wrapper";

    // Label (tên POI) – sẽ chỉ hiện khi chọn
    const label = document.createElement("div");
    label.className = "poi-marker-label";
    label.textContent = getName(poi);

    // Icon tròn như trước
    const icon = document.createElement("div");
    icon.className = "poi-marker";

    wrapper.appendChild(label);
    wrapper.appendChild(icon);

    const marker = new maplibregl.Marker({
      element: wrapper,
      anchor: "bottom"  // để label nằm ngay trên marker
    })
      .setLngLat([poi.lon, poi.lat])
      .addTo(map);

    // Lưu reference để highlight về sau
    marker._el = wrapper;    // wrapper
    marker._poiIdx = poi._idx;

    // Click vào marker (hoặc label) → show detail + GA
    wrapper.addEventListener("click", (e) => {
      e.stopPropagation();
      onPoiClick(poi);          // log GA
      updateUrlWithPoi(poi);    // ✅ NEW: met à jour l'URL pour partage
      showPoiDetail(poi._idx);  // sẽ gọi highlightMarkerForPoiIdx
    });

    return marker;
  }


  function clearMarkers() {
    markers.forEach(m => m.remove());
    markers = [];
  }

  function updateUserMarker() {
    if (!map || !userLocation) return;
    if (userMarker) {
      userMarker.setLngLat([userLocation.lon, userLocation.lat]);
    } else {
      const el = document.createElement("div");
      el.className = "user-marker";
      userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([userLocation.lon, userLocation.lat])
        .addTo(map);
    }
  }

  function updateNearbyList() {
    if (!map || !pois.length) return;
    const center = map.getCenter();
    const centerLat = center.lat;
    const centerLon = center.lng;

    // ✅ remember the center used for this computation
    lastCenterForNearby = { lat: centerLat, lon: centerLon };

    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    const valid = pois.filter(p => p.lat && p.lon);

    const cosLatCenter = Math.cos(centerLat * Math.PI / 180);
    let within = valid
      .map(p => ({
        ...p,
        dist: distanceKm(centerLat, centerLon, p.lat, p.lon, cosLatCenter),
      }))
      .filter(p => p.dist <= currentRadiusKm);

    let selected = [];

    if (within.length === 0) {
      selected = [];
    } else if (currentPriority === "nearest") {
      selected = within
        .sort((a, b) => a.dist - b.dist)
        .slice(0, currentMaxPoints);
    } else {
      selected = within
        .sort((a, b) => {
          const sa = typeof a.score === "number" ? a.score : -Infinity;
          const sb = typeof b.score === "number" ? b.score : -Infinity;
          return sb - sa;
        });
      if (selected.length > currentMaxPoints) {
        selected = selected.slice(0, currentMaxPoints);
      }
    }

    lastNearbyPois = selected;

    clearMarkers();
    selected.forEach(p => {
      const m = createMarker(p);
      markers.push(m);
    });

    highlightMarkerForPoiIdx(highlightedPoiIdx);
    updateUserMarker();

    if (!selected.length) {
      nearbyTitleEl.textContent = t.empty(currentRadiusKm);
      // 🔹 Message dài 2 dòng -> sidebar cao hơn -> đo lại
      updateLayoutVars();
      return;
    }

    updateNearbyTitle(selected.length);
    // 🔹 Khi quay lại trạng thái “Nearby places” (ít chữ hơn) cũng đo lại
    updateLayoutVars();
  }

  function fitToNearbyPois() {
    if (!map || !lastNearbyPois || !lastNearbyPois.length) return;

    if (lastNearbyPois.length === 1) {
      const p = lastNearbyPois[0];
      map.easeTo({
        center: [p.lon, p.lat],
        zoom: 16,
        essential: true
      });
      return;
    }

    const bounds = new maplibregl.LngLatBounds();
    lastNearbyPois.forEach(p => bounds.extend([p.lon, p.lat]));
    if (userLocation) bounds.extend([userLocation.lon, userLocation.lat]);

    map.fitBounds(bounds, { padding: 40 });
  }

  function initMap() {
    const osmStyle = {
      version: 8,
      sources: {
        "osm-tiles": {
          type: "raster",
          tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
          tileSize: 256,
          attribution: ""
        }
      },
      layers: [
        {
          id: "osm-tiles",
          type: "raster",
          source: "osm-tiles",
          minzoom: 0,
          maxzoom: 19
        }
      ]
    };

    map = new maplibregl.Map({
      container: "map",
      style: osmStyle,
      center: [PARIS_CENTER.lon, PARIS_CENTER.lat],
      zoom: 12
    });

    map.on("load", () => {
      if (deepLinkRef) {
        // On laissera openPoiFromDeepLink() agir dès que les POIs sont chargés
        return;
      }
      resetView();
    });


    map.on("moveend", () => {
      // Nếu là di chuyển do code (flyTo, easeTo khi chọn POI, locate...)
      // thì chỉ reset cờ và không cập nhật nearby
  if (isProgrammaticMove) {
      isProgrammaticMove = false;

      // ✅ If this programmatic move comes from "My location",
      // recompute nearby POIs around the new center.
      if (isLocateMove) {
        isLocateMove = false;

        const hadDetailBeforeMove = document.body.classList.contains('has-detail');
        const activeIdxBeforeMove = selectedPoiIdx;

        updateNearbyList();

        // If detail was open, keep it only if POI still in nearby
        if (hadDetailBeforeMove && activeIdxBeforeMove !== null) {
          const stillInNearby = lastNearbyPois.some(p => p._idx === activeIdxBeforeMove);
          if (stillInNearby) {
            highlightMarkerForPoiIdx(activeIdxBeforeMove);
            return;
          }
        }
        if (document.body.classList.contains('has-detail')) {
          hidePoiDetail();
        }
      }

      return;
    }

      // ✅ NEW: ignore zoom-only changes (center practically unchanged)
      const newCenter = map.getCenter();
      if (lastCenterForNearby) {
        const d = distanceKm(
          newCenter.lat, newCenter.lng,
          lastCenterForNearby.lat, lastCenterForNearby.lon
        );
        // ~0.003 km = 3 meter → treat as “same center”
        if (d < 0.003) {
          return;
        }
      }

      // Trước khi updateNearbyList, ghi nhớ trạng thái detail + POI đang chọn
      const hadDetailBeforeMove = document.body.classList.contains('has-detail');
      const activeIdxBeforeMove = selectedPoiIdx;

      // Cập nhật danh sách POI theo center mới
      updateNearbyList();

      // Nếu trước đó đang mở detail và có POI đang được chọn
      if (hadDetailBeforeMove && activeIdxBeforeMove !== null) {
        // Kiểm tra xem POI đang active còn nằm trong danh sách nearby mới hay không
        const stillInNearby = lastNearbyPois.some(p => p._idx === activeIdxBeforeMove);

        if (stillInNearby) {
          // ✅ POI vẫn còn trong danh sách mới:
          //    - Giữ nguyên panel chi tiết
          //    - Re-highlight marker tương ứng (vì marker vừa được tạo lại)
          highlightMarkerForPoiIdx(activeIdxBeforeMove);
          // Không gọi hidePoiDetail(), tức là giữ nguyên detail đang hiển thị
          return;
        }
      }

      // ❌ Nếu không còn detail trước đó,
      //    hoặc POI active đã bị loại khỏi danh sách nearby mới
      //    → ẩn panel detail + bỏ highlight
      if (document.body.classList.contains('has-detail')) {
        hidePoiDetail();
      }
    });


    map.on("click", (e) => {
      if (!e.originalEvent.target.closest('.maplibregl-marker')) {
        highlightMarkerForPoiIdx(null);
        selectedPoiIdx = null;
        hidePoiDetail();
        clearPoiFromUrl(); // ✅ NEW: retire id de l'URL (optionnel)
      }
    });
  }

  async function loadPois() {
    // 1️⃣ Không có cache → dùng chiến lược core + background như trước
    try {
      // 1.1. Load nhanh bản core (≈100 POIs)
      const resCore = await fetch("paris_core.json");
      if (!resCore.ok) {
        throw new Error("Không load được paris_core.json: " + resCore.status);
      }

      const rawCore = await resCore.json();

      // Gán _idx tạm thời cho core
      pois = rawCore.map((p, idx) => ({ ...p, _idx: idx }));

      // Build map reference -> POI (tạm)
      poisByRef = {};
      pois.forEach(p => {
        if (p.reference) {
          poisByRef[p.reference] = p;
        }
      });

      console.log("Core POIs loaded:", pois.length);

      openPoiFromDeepLink();

      if (map) {
        updateNearbyList();
        if (!deepLinkRef) {
          fitToNearbyPois();
        }
      }

      // 1.2. Load bản full ở background
      loadFullPoisInBackground();
    } catch (err) {
      console.error(err);
      alert("Không load được dữ liệu POI ban đầu (paris_core.json). Hãy kiểm tra lại file và đường dẫn.");
    }
  }

  async function loadFullPoisInBackground() {
    try {
      console.log('⏳ Loading full POIs in background...');
      const resFull = await fetch("paris_story_multilanguage.json");
      if (!resFull.ok) {
        throw new Error("Không load được paris_story_multilanguage.json: " + resFull.status);
      }

      const rawFull = await resFull.json();

      // Duyệt full, merge vào poisByRef
      rawFull.forEach(p => {
        const ref = p.reference;
        if (!ref) return;

        if (poisByRef[ref]) {
          // 🔁 Đã có trong core → cập nhật fields mới
          poisByRef[ref] = {
            ...poisByRef[ref],
            ...p
          };
        } else {
          // ➕ Chưa có trong core → thêm mới
          poisByRef[ref] = { ...p };
        }
      });

      // Chuyển lại về mảng pois, gán _idx mới
      const mergedList = Object.values(poisByRef).map((p, idx) => ({
        ...p,
        _idx: idx
      }));

      pois = mergedList;
      openPoiFromDeepLink();
      isFullPoisLoaded = true;

      console.log("✅ Full POIs loaded & merged:", pois.length);

      // Sau khi merge xong, cập nhật lại nearby
      if (map) {
        updateNearbyList();
        // Không fitToNearbyPois để tránh map nhảy khi user đang xem
      }
    } catch (err) {
      console.error("Lỗi load full POIs:", err);
      // Không alert để tránh làm phiền user
    }
  }


  function renderLanguageMenu() {
    if (!availableLanguages.length) return;
    langMenu.innerHTML = "";

    availableLanguages.forEach(cfg => {
      const btn = document.createElement("button");
      btn.setAttribute("data-lang-id", cfg.id);
      btn.innerHTML = `<span>${cfg.flag}</span><span>${cfg.label}</span>`;
      langMenu.appendChild(btn);
    });

    langToggleBtn.textContent = currentLangConfig.flag || "🌐";
  }

  function applyLanguage() {
    // ✅ garder lang dans l'URL; conserver aussi id si un POI est sélectionné
    const url = new URL(window.location.href);
    url.searchParams.set("lang", getCurrentLangIdForUrl());
    if (selectedPoiIdx !== null && pois[selectedPoiIdx]?.reference) {
      url.searchParams.set("id", pois[selectedPoiIdx].reference);
    }
    history.replaceState({}, "", url.toString());


    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    appTitleEl.textContent    = t.appTitle;
    appSubtitleEl.textContent = t.appSubtitle;
    locateBtn.textContent     = t.locate;
    radiusLabelEl.textContent = t.radiusLabel;
    priorityLabelEl.textContent = t.priorityLabel;
    countLabelEl.textContent  = t.countLabel;
    updateNearbyTitle(lastNearbyPois.length || 0);

    const nearestOpt = prioritySelect.querySelector('option[value="nearest"]');
    const topOpt = prioritySelect.querySelector('option[value="topscore"]');
    if (nearestOpt) nearestOpt.textContent = t.priorityNearest;
    if (topOpt) topOpt.textContent = t.priorityTopScore;

    langToggleBtn.textContent = currentLangConfig.flag || "🌐";

    updateNearbyList();

    // nếu đang mở detail thì render lại nội dung theo ngôn ngữ mới nhưng không di chuyển map
    if (selectedPoiIdx !== null) {
      showPoiDetail(selectedPoiIdx, { skipMove: true });
    }

    // 🔹 đo lại sau khi text header/subtitle đổi
    updateLayoutVars();
  }

  function resetView() {
    let center = [NOTRE_DAME.lon, NOTRE_DAME.lat];

    if (userLocation) {
      const d = distanceKm(
        userLocation.lat,
        userLocation.lon,
        PARIS_CENTER.lat,
        PARIS_CENTER.lon
      );
      if (d <= 8) {
        center = [userLocation.lon, userLocation.lat];
      }
    }

    map.jumpTo({
      center,
      zoom: 14
    });

    highlightMarkerForPoiIdx(null);
    selectedPoiIdx = null;
    hidePoiDetail();

    updateNearbyList();
    fitToNearbyPois();
  }

  function initControls() {
    radiusSelect.addEventListener("change", () => {
      currentRadiusKm = parseFloat(radiusSelect.value);
      updateNearbyList();
      fitToNearbyPois();
      onChangeRadius(currentRadiusKm);
    });

    prioritySelect.addEventListener("change", () => {
      currentPriority = prioritySelect.value || "nearest";
      updateNearbyList();
      fitToNearbyPois();
      onChangePriority(currentPriority);
    });

    maxPointsSelect.addEventListener("change", () => {
      currentMaxPoints = parseInt(maxPointsSelect.value, 10) || 20;
      updateNearbyList();
      fitToNearbyPois();
    });

    locateBtn.addEventListener("click", () => {
      isLocateMove = true;
      const uiLang = getUiLangId();
      const t = i18n[uiLang];
      if (!navigator.geolocation) {
        alert("Trình duyệt không hỗ trợ định vị.");
        return;
      }
      locateBtn.disabled = true;
      locateBtn.textContent = t.locate.replace("📍", "⏳");

      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude } = pos.coords;
          userLocation = { lat: latitude, lon: longitude };
          updateUserMarker();
          hidePoiDetail();
          isProgrammaticMove = true;
          map.flyTo({
            center: [longitude, latitude],
            zoom: 14,
            essential: true
          });
          locateBtn.disabled = false;
          locateBtn.textContent = t.locate;
        },
        err => {
          console.error(err);
          alert("Không lấy được vị trí của bạn.");
          locateBtn.disabled = false;
          locateBtn.textContent = t.locate;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    langToggleBtn.addEventListener("click", () => {
      langMenu.classList.toggle("open");
    });

    langMenu.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-lang-id]");
      if (!btn) return;
      const id = btn.getAttribute("data-lang-id");
      if (!id) return;
      const cfg = availableLanguages.find(l => l.id === id);
      if (!cfg || cfg === currentLangConfig) {
        langMenu.classList.remove("open");
        return;
      }
      currentLangConfig = cfg;
      langMenu.classList.remove("open");
      applyLanguage();
    });

    document.addEventListener("click", (e) => {
      if (!langMenu.contains(e.target) && !langToggleBtn.contains(e.target)) {
        langMenu.classList.remove("open");
      }
    });
  }

  function showPoiDetail(idx, options = {}) {
    const poi = pois[idx];
    if (!poi) return;
    const skipMove = options.skipMove;

    selectedPoiIdx = idx;
    highlightMarkerForPoiIdx(idx);

    const uiLang = getUiLangId();
    const t = i18n[uiLang];

    const title     = getName(poi);
    const addr      = getAddress(poi);
    const storyFull = getStory(poi) || "";

    let scoreText = "";
    if (typeof poi.score === "number") {
      const rounded = Math.round(poi.score * 100) / 10;
      scoreText = rounded.toFixed(1);
    }

    const imgSrc = poi.reference
      ? `./images/${poi.reference.toLowerCase()}.jpg`
      : "";

    poiDetailEl.innerHTML = `
      <div class="poi-detail-img-wrapper">
        <img
          src="${imgSrc}"
          class="poi-detail-img"
          alt="${title}"
          onerror="this.style.display='none';"
        />
      </div>

    <!-- header: title + score trên cùng một hàng -->
    <div class="poi-detail-header">
      <div class="poi-detail-title">${title}</div>
      ${
        scoreText
          ? `<div class="poi-score">⭐ ${scoreText}/10</div>`
          : ""
      }
    </div>

    <div class="poi-detail-address">${addr}</div>

    <button type="button"
      class="poi-detail-listen"
      onclick="playPoiStory(${idx})">
      ${t.ttsLabel}
    </button>

      <div class="poi-detail-story" id="poi-detail-story"></div>
    `;

    // 2️⃣ Gán text cho story bằng textContent → luôn hiển thị đầy đủ, an toàn
      const storyEl = document.getElementById("poi-detail-story");
      if (storyEl) {
        storyEl.textContent = storyFull;
      }
    document.body.classList.add('has-detail');

    if (map && poi.lat && poi.lon && !skipMove) {
      isProgrammaticMove = true;
      map.easeTo({
        center: [poi.lon, poi.lat],
        zoom: map.getZoom(),
        essential: true
      });
    }
  }

  function hidePoiDetail() {
    poiDetailEl.innerHTML = "";
    document.body.classList.remove('has-detail');
    selectedPoiIdx = null;
    highlightMarkerForPoiIdx(null);
  }

  function updateNearbyTitle(count) {
  const uiLang = getUiLangId();
  const t = i18n[uiLang];

  if (!count || count <= 0) {
      // No POIs → just show the plain label
      nearbyTitleEl.textContent = t.nearbyDefault;
    } else {
      // Show count + label, e.g. "10 Nearby places"
      nearbyTitleEl.textContent = `${count} ${t.nearbyDefault}`;
    }
  }


  (async function main() {
    // 1️⃣ Init map & UI càng sớm càng tốt
    initMap();
    initControls();
    renderLanguageMenu();
    applyLanguage();   // sẽ hiển thị text, nút… ngay cả khi chưa có POI

    // 2️⃣ Load POIs ngầm
    loadPois();        // KHÔNG await
  })();



</script>
