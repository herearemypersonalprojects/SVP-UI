<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contenteditable Image Row Editor</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 24px;
            font-family: "Segoe UI", system-ui, sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }
        .editor-shell {
            max-width: 960px;
            margin: 0 auto;
            background: #fff;
            border: 1px solid #dbe7ff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 44px rgba(15, 23, 42, .08);
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid #e5e7eb;
            background: linear-gradient(180deg, #fff, #f8fbff);
        }
        .toolbar input[type="url"] {
            flex: 1 1 320px;
            min-width: 220px;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font: inherit;
        }
        .toolbar button {
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            color: #fff;
            background: #2563eb;
        }
        .toolbar button.secondary {
            background: #475569;
        }
        .editor {
            min-height: 320px;
            padding: 18px;
            outline: none;
            line-height: 1.7;
        }
        .editor p {
            margin: 0 0 12px;
        }
        .editor p.is-empty::before {
            content: attr(data-placeholder);
            color: #94a3b8;
            pointer-events: none;
        }
        .image-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        .image-row img {
            max-width: 100%;
            height: auto;
            flex: 1 1 calc((100% - 16px) / 3);
            min-width: min(220px, 100%);
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #dbe7ff;
            background: #f8fafc;
            display: block;
        }
        .output {
            width: 100%;
            min-height: 180px;
            border: 0;
            border-top: 1px solid #e5e7eb;
            padding: 16px 18px;
            font: 13px/1.6 ui-monospace, SFMono-Regular, Consolas, monospace;
            color: #0f172a;
            background: #f8fafc;
            resize: vertical;
        }
        .hint {
            max-width: 960px;
            margin: 14px auto 0;
            color: #475569;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="editor-shell">
        <div class="toolbar">
            <input id="image-url-input" type="url" placeholder="Dán 1 hoặc nhiều URL ảnh, ngăn cách bằng dấu cách / xuống dòng">
            <button id="insert-image-btn" type="button">Chèn ảnh</button>
            <button id="save-html-btn" class="secondary" type="button">Lấy HTML sạch</button>
        </div>

        <div id="editor" class="editor" contenteditable="true" spellcheck="true">
            <p data-placeholder="Nhập nội dung hoặc chèn ảnh..."><br></p>
        </div>

        <textarea id="html-output" class="output" readonly></textarea>
    </div>

    <div class="hint">
        Dán nhiều ảnh liên tiếp hoặc paste nhiều URL ảnh để chúng tự vào cùng hàng. `Enter` khi đang ở hàng ảnh sẽ thoát ra đoạn mới.
    </div>

    <script>
        (() => {
            'use strict';

            const editor = document.getElementById('editor');
            const imageUrlInput = document.getElementById('image-url-input');
            const insertImageBtn = document.getElementById('insert-image-btn');
            const saveHtmlBtn = document.getElementById('save-html-btn');
            const htmlOutput = document.getElementById('html-output');
            const MAX_IMAGES_PER_ROW = 3;
            const IMAGE_URL_RE = /https?:\/\/[^\s"'<>]+\.(?:png|jpe?g|gif|webp|avif|bmp|svg)(?:\?[^\s"'<>]*)?/gi;

            const createParagraph = () => {
                const p = document.createElement('p');
                p.appendChild(document.createElement('br'));
                return p;
            };

            const isImageOnlyBlock = (node) => {
                if (!(node instanceof HTMLElement) || !node.matches('p, div') || node.classList.contains('image-row')) {
                    return false;
                }
                const images = Array.from(node.querySelectorAll(':scope > img'));
                if (images.length !== 1) {
                    return false;
                }
                const clone = node.cloneNode(true);
                clone.querySelectorAll('img').forEach((img) => img.remove());
                return !String(clone.textContent || '').replace(/\u00a0/g, ' ').trim();
            };

            const isEmptyParagraph = (node) => {
                if (!(node instanceof HTMLElement) || node.tagName !== 'P') {
                    return false;
                }
                const clone = node.cloneNode(true);
                clone.querySelectorAll('br').forEach((item) => item.remove());
                return !String(clone.textContent || '').replace(/\u00a0/g, ' ').trim() && !clone.querySelector('img');
            };

            const getTopLevelNode = (node) => {
                let current = node instanceof Node ? node : null;
                while (current && current.parentNode !== editor) {
                    current = current.parentNode;
                }
                return current instanceof Node && current.parentNode === editor ? current : null;
            };

            const getPreviousMeaningfulSibling = (node) => {
                let current = node ? node.previousSibling : editor.lastChild;
                while (current) {
                    if (current.nodeType === Node.TEXT_NODE && !String(current.textContent || '').trim()) {
                        current = current.previousSibling;
                        continue;
                    }
                    if (current instanceof HTMLElement && isEmptyParagraph(current)) {
                        current = current.previousSibling;
                        continue;
                    }
                    return current;
                }
                return null;
            };

            const placeCaretAtStart = (node) => {
                const target = node instanceof HTMLElement ? node : editor;
                const range = document.createRange();
                const selection = window.getSelection();
                range.selectNodeContents(target);
                range.collapse(true);
                selection.removeAllRanges();
                selection.addRange(range);
                target.focus();
            };

            const ensureParagraphAfter = (node) => {
                let next = node.nextSibling;
                while (next && next.nodeType === Node.TEXT_NODE && !String(next.textContent || '').trim()) {
                    next = next.nextSibling;
                }
                if (next instanceof HTMLElement && next.tagName === 'P') {
                    return next;
                }
                const p = createParagraph();
                node.after(p);
                return p;
            };

            const createImageRow = () => {
                const row = document.createElement('div');
                row.className = 'image-row';
                return row;
            };

            const insertRowAfter = (row) => {
                const nextRow = createImageRow();
                row.after(nextRow);
                return nextRow;
            };

            const createImage = (src) => {
                const img = document.createElement('img');
                img.src = src;
                img.alt = '';
                img.loading = 'lazy';
                img.decoding = 'async';
                return img;
            };

            const getCurrentRow = () => {
                const selection = window.getSelection();
                if (!selection.rangeCount) {
                    return null;
                }
                const anchorNode = selection.getRangeAt(0).startContainer;
                return anchorNode instanceof Node && anchorNode.parentNode
                    ? (anchorNode.nodeType === Node.ELEMENT_NODE ? anchorNode : anchorNode.parentNode).closest('.image-row')
                    : null;
            };

            const resolveRowForInsertion = () => {
                const activeRow = getCurrentRow();
                if (activeRow instanceof HTMLElement) {
                    return activeRow.querySelectorAll('img').length < MAX_IMAGES_PER_ROW
                        ? activeRow
                        : insertRowAfter(activeRow);
                }

                const selection = window.getSelection();
                const topLevel = selection.rangeCount ? getTopLevelNode(selection.getRangeAt(0).startContainer) : null;
                const previousNode = topLevel ? getPreviousMeaningfulSibling(topLevel) : getPreviousMeaningfulSibling(null);

                if (previousNode instanceof HTMLElement && previousNode.classList.contains('image-row')) {
                    if (previousNode.querySelectorAll('img').length < MAX_IMAGES_PER_ROW) {
                        return previousNode;
                    }
                    return insertRowAfter(previousNode);
                }

                const row = createImageRow();
                if (topLevel instanceof HTMLElement && isEmptyParagraph(topLevel)) {
                    topLevel.replaceWith(row);
                } else if (topLevel) {
                    topLevel.after(row);
                } else {
                    editor.appendChild(row);
                }
                return row;
            };

            const insertImageUrls = (urls) => {
                const safeUrls = urls.filter(Boolean);
                if (!safeUrls.length) {
                    return;
                }
                let row = resolveRowForInsertion();
                safeUrls.forEach((url) => {
                    if (row.querySelectorAll('img').length >= MAX_IMAGES_PER_ROW) {
                        const nextRow = createImageRow();
                        row.after(nextRow);
                        row = nextRow;
                    }
                    row.appendChild(createImage(url));
                });
                const paragraph = ensureParagraphAfter(row);
                placeCaretAtStart(paragraph);
                cleanupRows(editor);
            };

            const cleanupRows = (root) => {
                Array.from(root.querySelectorAll('.image-row')).forEach((row) => {
                    const images = Array.from(row.querySelectorAll(':scope > img[src]'));
                    row.querySelectorAll(':scope > *:not(img)').forEach((node) => node.remove());
                    if (!images.length) {
                        row.remove();
                    }
                });
                Array.from(root.children).forEach((child) => {
                    if (isImageOnlyBlock(child)) {
                        const row = createImageRow();
                        row.appendChild(child.querySelector('img').cloneNode(true));
                        child.replaceWith(row);
                    }
                });
                if (!root.children.length) {
                    root.appendChild(createParagraph());
                }
                Array.from(root.querySelectorAll('p')).forEach((p) => {
                    p.classList.toggle('is-empty', isEmptyParagraph(p));
                    p.setAttribute('data-placeholder', 'Nhập nội dung hoặc chèn ảnh...');
                });
            };

            const extractImageUrlsFromHtml = (html) => {
                const template = document.createElement('template');
                template.innerHTML = String(html || '');
                return Array.from(template.content.querySelectorAll('img[src]'))
                    .map((img) => String(img.getAttribute('src') || '').trim())
                    .filter(Boolean);
            };

            const extractImageUrlsFromText = (text) => {
                return Array.from(String(text || '').matchAll(IMAGE_URL_RE)).map((match) => match[0]);
            };

            async function uploadImageFile(file) {
                return URL.createObjectURL(file);
            }

            const buildCleanHtml = () => {
                const clone = editor.cloneNode(true);
                const nextNodes = [];
                let pendingImages = [];

                const flushImages = () => {
                    while (pendingImages.length) {
                        const row = createImageRow();
                        pendingImages.splice(0, MAX_IMAGES_PER_ROW).forEach((img) => row.appendChild(img));
                        nextNodes.push(row);
                    }
                };

                Array.from(clone.childNodes).forEach((node) => {
                    if (node.nodeType === Node.TEXT_NODE) {
                        if (String(node.textContent || '').trim()) {
                            flushImages();
                            const p = document.createElement('p');
                            p.textContent = node.textContent.trim();
                            nextNodes.push(p);
                        }
                        return;
                    }
                    if (!(node instanceof HTMLElement)) {
                        return;
                    }
                    if (node.classList.contains('image-row')) {
                        pendingImages.push(...Array.from(node.querySelectorAll(':scope > img[src]')).map((img) => img.cloneNode(true)));
                        return;
                    }
                    if (isImageOnlyBlock(node)) {
                        const img = node.querySelector('img[src]');
                        if (img) {
                            pendingImages.push(img.cloneNode(true));
                        }
                        return;
                    }
                    flushImages();
                    if (!isEmptyParagraph(node)) {
                        node.removeAttribute('data-placeholder');
                        node.classList.remove('is-empty');
                        nextNodes.push(node.cloneNode(true));
                    }
                });
                flushImages();

                clone.replaceChildren(...nextNodes);
                return clone.innerHTML.trim();
            };

            insertImageBtn.addEventListener('click', () => {
                const urls = extractImageUrlsFromText(imageUrlInput.value);
                if (!urls.length) {
                    imageUrlInput.focus();
                    return;
                }
                insertImageUrls(urls);
                imageUrlInput.value = '';
            });

            saveHtmlBtn.addEventListener('click', () => {
                htmlOutput.value = buildCleanHtml();
            });

            editor.addEventListener('keydown', (event) => {
                const row = getCurrentRow();
                if (event.key === 'Enter' && row) {
                    event.preventDefault();
                    const paragraph = ensureParagraphAfter(row);
                    placeCaretAtStart(paragraph);
                }
            });

            editor.addEventListener('input', () => {
                cleanupRows(editor);
            });

            editor.addEventListener('paste', async (event) => {
                const clipboard = event.clipboardData;
                if (!clipboard) {
                    return;
                }

                const imageFiles = Array.from(clipboard.files || []).filter((file) => file.type.startsWith('image/'));
                if (imageFiles.length) {
                    event.preventDefault();
                    const urls = await Promise.all(imageFiles.map((file) => uploadImageFile(file)));
                    insertImageUrls(urls);
                    return;
                }

                const htmlUrls = extractImageUrlsFromHtml(clipboard.getData('text/html'));
                if (htmlUrls.length) {
                    event.preventDefault();
                    insertImageUrls(htmlUrls);
                    return;
                }

                const textUrls = extractImageUrlsFromText(clipboard.getData('text/plain'));
                if (textUrls.length) {
                    event.preventDefault();
                    insertImageUrls(textUrls);
                }
            });

            cleanupRows(editor);
            htmlOutput.value = buildCleanHtml();
        })();
    </script>
</body>
</html>
